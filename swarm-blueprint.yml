version: '3.8'
services:
  web-farm-decoy:
    image: eidolon-honeypot:latest
    networks:
      - swarm-net
    ports:
      - target: 80
        published: 0
        mode: host
    deploy:
      replicas: 50
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 0
      update_config:
        parallelism: 5
        delay: 10s
networks:
  swarm-net:
    driver: overlay
    attachable: true
