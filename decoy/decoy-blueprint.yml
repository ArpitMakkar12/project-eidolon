services:
  web-decoy:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    # Touch the file to create it, pipe it to Logstash in the background, and start Nginx
    command: /bin/sh -c "touch /tmp/trap.log && tail -F /tmp/trap.log | nc eidolon-logstash 5000 & nginx -g 'daemon off;'"
    networks:
      - eidolon-swarm_observer-net

networks:
  eidolon-swarm_observer-net:
    external: true
